# Product Spec 只回答一件事：这个产品最终应该是什么。
# 这里记录的是“用户最终会看到什么、如何理解这个产品、核心交互如何成立”，
# 而不是“开发者准备用什么语言、框架、运行时或打包方式去实现它”。
# 因此，凡是只影响实现手段而不改变用户可观察结果的决定，
# 都不应写在这里，而应进入 implementation_config.toml。
#
# 这个文件默认用于人与 AI 一起讨论产品形态，所以注释优先讲清楚：
# 1. 这一段在定义什么产品真相；
# 2. 它和相邻层（Framework / Implementation Config）的边界在哪里；
# 3. 为什么这些字段属于产品层，而不是实现层。

# [project] 定义产品身份与对外描述。
# 这一段回答“这个产品叫什么、以什么身份被识别、对外如何描述自己”，
# 关注的是用户、评审者和生成器共同看到的稳定产品身份，
# 而不是仓库内部目录、模块命名或运行时代码组织方式。
[project]
project_id = "knowledge_base_basic"
template = "knowledge_base_workbench"
display_name = "ArchSync Knowledge Chat"
description = "A ChatGPT-style knowledge chat client compiled from framework standards and one product spec."
version = "0.3.0"

# [framework] 声明这个产品依附于哪些框架标准。
# 这些引用决定了产品可落入的结构空间、边界和约束，
# 表明本产品是在哪些共同结构语言之内被实例化出来的。
# 这里写的是“框架来源”，不是某个实现库、SDK、组件包或运行时名字。
[framework]
frontend = "framework/frontend/L2-M0-前端框架标准模块.md"
domain = "framework/knowledge_base/L2-M0-知识库工作台场景模块.md"
backend = "framework/backend/L2-M0-知识库接口框架标准模块.md"
preset = "document_chat_workbench"

# [surface] 描述用户可见的外层形态。
# 这里关心的是：主界面由哪些承载面组成、这些承载面如何协同工作、
# 用户进入产品后首先感知到的是怎样的整体结构。
# 这里不讨论 DOM 层级、CSS 布局技巧、前端框架组件树等实现细节，
# 只保留产品层可观察、可讨论、可被多种实现共享的结构真相。
[surface]
shell = "conversation_sidebar_shell"
layout_variant = "chatgpt_knowledge_client"
sidebar_width = "md"
preview_mode = "drawer"
density = "comfortable"

# [surface.copy] 收纳界面壳体直接向用户说出的文案。
# 这一段不是营销素材库，而是决定首页、空态、壳体标题如何介绍自己的产品语义。
# 当团队讨论“首屏应该给用户什么心理预期”时，优先看这里。
[surface.copy]
hero_kicker = "Framework-Compiled Product"
hero_title = "ArchSync Knowledge Chat"
hero_copy = "A ChatGPT-style knowledge chat client with inline citations, on-demand source drawers, and secondary knowledge pages."
library_title = "Knowledge Bases"
preview_title = "Citation Sources"
toc_title = "Source Sections"
chat_title = "Knowledge Chat"
empty_state_title = "Start a knowledge conversation"
empty_state_copy = "Ask directly in the composer. Sources stay quiet until you open a citation."

# [visual] 定义视觉语义，而不是直接定义实现 token。
# 这里回答的是：这个产品整体想传达怎样的品牌方向、明暗气质、圆角尺度和视觉密度。
# 它保留的是跨实现可复用的语义选择，例如“中等阴影”“大圆角”“浅色面板”，
# 而不是某个 CSS 变量名、像素值、设计工具导出结果或特定组件库主题配置。
[visual]
brand = "ArchSync"
accent = "#2563eb"
surface_preset = "light"
radius_scale = "xl"
shadow_level = "md"
font_scale = "md"

# [route] 记录产品导航真相。
# 它描述用户可以进入哪些页面、这些页面以什么稳定路径暴露给外界，
# 以及产品对外承诺的 API 命名空间长什么样。
# 这里保留“路径语义”和“入口稳定性”，
# 不讨论前端路由库、服务端挂载方式、协议细节或部署网关改写方式。
[route]
home = "/"
login = "/login"
workbench = "/knowledge-base"
knowledge_list = "/knowledge-bases"
knowledge_detail = "/knowledge-bases/details"
document_detail_prefix = "/knowledge-bases/details/documents"
api_prefix = "/api/knowledge"

# [page_shells] 定义页面承载壳类型，而不是具体前端 layout 代码。
# 这里回答的是：哪些页面共享“工作台壳”，哪些页面应使用“独立任务壳”。
# 如果后续出现注册页、权限不足页、邀请确认页等，它们也可以直接复用 standalone_shell，
# 而不需要再为某一个页面单独发明一次特判逻辑。
[page_shells]
workspace_shell = ["workbench", "knowledge_list", "knowledge_detail", "document_detail"]
standalone_shell = ["login"]

# [auth] 定义产品层的身份前置条件与受保护目标真相。
# 这一段回答的是：这个知识库工作台是否需要认证、哪些页面受保护、
# 用户未认证时会被带到哪里，以及认证成功后是否回到原工作台访问目标。
# 它主要承接 auth 场景模块里的 `GUARDFLOW` 与 `RETURNFLOW`，属于用户可观察的产品行为，
# 不讨论 token、cookie、SDK、header 名或具体认证服务，也不承接 citation drawer /
# document detail 的来源返回回路；后者仍属于 [return] 的产品真相。
[auth]
# 当前产品是否启用认证能力。
enabled = true
# 认证在用户旅程里的介入模式；这里要求进入工作台前先完成认证。
mode = "required_before_workbench"
# 认证入口以什么方式出现；这里使用独立登录页。
entry = "dedicated_login_page"
# 会话作用范围覆盖到哪里；这里覆盖整个工作台访问。
session_scope = "workspace"
# 登录成功后是否尝试返回用户原本要去的目标。
return_after_login = true
# 哪些路由属于受保护内容，进入前必须已有有效会话。
protected_routes = ["workbench", "knowledge_list", "knowledge_detail", "document_detail"]
# 哪些路由在未登录时仍可直接访问。
public_routes = ["home", "login"]
# 无法恢复原目标时，登录后的默认落点。
default_return_target = "workbench"

# [auth.copy] 收纳认证相关界面直接向用户展示的文案。
# 这里主要承接 `FEEDBACKFLOW` 的用户可见提示，以及 `AUTHENTRYFLOW` 中入口页直接展示的标题与动作文案。
# 如果团队要讨论“为什么这里要求认证”“认证后会回到哪个工作台目标”，优先修改这里，
# 而不是把这些产品文案散落到实现代码里。
[auth.copy]
# 登录页主标题，回答“这是一个什么认证入口”。
login_title = "统一验证平台"
# 登录页副标题，补充入口用途与服务承诺。
login_subtitle = "提供统一认证服务"
# 主操作文案，对应用户完成认证的主要触发动作。
primary_action = "登录"
# 次操作文案，对应离开认证入口的辅助动作。
secondary_action = "返回首页"
# 守卫提示文案，用于解释当前为什么被引导到认证入口。
guard_message = "当前页面需要先完成登录。"
# 登录未完成时的失败提示。
failure_message = "登录未完成，请检查输入后重试。"
# 会话失效后要求重新登录时的提示。
expired_message = "当前会话已失效，请重新登录后继续。"
# 用户主动取消登录后的提示。
cancel_message = "你已取消本次登录，可返回首页或稍后重新进入。"
# 需要重新认证时的提示，强调继续访问当前内容前必须重新完成登录。
reauth_message = "为了继续访问当前内容，需要重新完成登录。"

# [auth.surface] 定义认证入口页的产品级承载结构，而不是具体前端实现。
# 这里主要承接 `AUTHENTRYFLOW`：认证入口是否为独立页面、有哪些区域、是否展示品牌、
# 是否展示受保护提示与返回提示。它回答“认证入口从用户视角长什么结构”，
# 但不讨论 React 组件树、CSS class 或像素级布局。
[auth.surface]
# 登录入口页的整体呈现形态；当前产品固定为居中的独立表单页。
page_variant = "centered_form"
# 登录页落在哪类页面壳里；这里表达它作为独立页面出现，而不是嵌在工作台内部。
shell_variant = "standalone_shell"
# 登录入口采用哪种用户可见认证方式；当前为用户名+密码表单。
entry_variant = "username_password"
# 登录页按什么区域顺序组织；这里约束头部、表单区、辅助动作区的顺序。
sections = ["login_header", "login_form", "secondary_actions"]
# 是否显示品牌或产品 kicker。
show_brand = false
# 是否显示“当前页面需要先登录”这类守卫提示。
show_guard_message = false
# 是否显示“登录成功后会返回原目标页”这类返回提示。
show_return_hint = false
# 是否显示次操作按钮，例如“返回首页”。
show_secondary_action = true
# 登录表单的容器结构；这里表达单卡片承载。
container_variant = "single_card"
# 登录页的信息密度；影响整体松紧感，但仍属于产品层可观察布局风格。
density = "comfortable"
# 主按钮强调程度；这里表达主操作明显强于次操作。
action_emphasis = "primary_strong"
# 登录页头部内容的对齐方式。
header_alignment = "center"

# [auth.flow] 定义认证入口与受保护工作台之间的产品级交互流转。
# 这里同时承接 `GUARDFLOW`、`RETURNFLOW`、`FEEDBACKFLOW` 与 `SESSIONFLOW`：
# 未认证访问受保护页面时怎么处理、认证成功后回哪个工作台目标、
# 失败时如何反馈、取消时如何离开，以及会话失效后如何重新进入。它属于产品交互真相，
# 不讨论具体路由库调用、session 存储细节或认证协议，也不承接知识引用后的来源返回规则。
[auth.flow]
# 访问受保护页面时如何进入认证入口。
guard_behavior = "redirect_to_login"
# 提交登录后在成功前停留在哪个页面阶段。
submit_behavior = "stay_on_page_until_success"
# 登录成功后回到哪里；这里要求回原目标页。
success_behavior = "redirect_to_return_target"
# 登录失败时用什么反馈方式告知用户。
failure_feedback = "inline_message"
# 用户取消登录后离开到哪里。
cancel_behavior = "return_home"
# 会话已失效时如何重新进入认证入口。
expired_behavior = "redirect_to_login_with_message"
# 需要重新认证时是否保留原目标并回到登录入口。
reauth_behavior = "return_to_login_and_preserve_target"
# 是否恢复登录前目标。
restore_target = true
# 是否保留查询参数。
preserve_query = true
# 是否保留锚点。
preserve_anchor = false

# [auth.contract] 定义认证相关后端交互在产品层承诺的动作语义。
# 这里主要承接 `SESSIONFLOW`，并把它映射到更底层 `AUTHREQUEST / SESSIONSTATE / AUTHERROR`
# 在当前产品里的可观察动作真相：这个产品需要哪几类认证动作、前端何时必须探测会话，
# 以及哪些会话失效结果会触发重新进入认证入口。
# 它仍然属于产品真相，不写 HTTP 方法、header 名、cookie 名或 SDK。
[auth.contract]
# 建立登录会话时，产品层承诺的动作语义名。
login_action = "session_start"
# 主动退出登录时，产品层承诺的动作语义名。
logout_action = "session_terminate"
# 前端何时必须探测会话状态。
session_probe = "required_on_protected_entry"
# 产品层承认的主要失败模式。
failure_modes = ["invalid_session", "expired_session"]
# 哪些情形会触发重新认证。
reauth_triggers = ["expired_session", "protected_entry_without_session"]

# [a11y] 定义产品层的可访问规则。
# 它回答“用户应该以什么顺序读到界面、键盘如何主要移动、系统需要播报哪些状态”，
# 这些都属于产品体验的一部分，而不是单纯的实现补丁。
# 具体 aria 属性、DOM 角色和实现库适配可在实现层完成，但必须满足这里的体验要求。
[a11y]
reading_order = ["login_header", "login_form", "conversation_sidebar", "chat_header", "message_stream", "chat_composer", "citation_drawer"]
keyboard_nav = ["login-primary-action", "new-chat", "conversation-item", "chat-input", "citation-ref", "citation-drawer-close"]
announcements = ["login required", "current knowledge base", "active conversation", "citation source opened"]

# [library] 定义产品向用户暴露的知识库对象。
# 这里讨论的是：知识库在产品里以什么身份出现、范围多大、允许用户做哪些动作、
# 默认把用户注意力引向哪里。它是业务对象层的产品真相。
# 实现层可以决定数据表、存储引擎和接口承载方式，但不能改写这里承诺的对象能力。
[library]
knowledge_base_id = "research-and-standards"
knowledge_base_name = "研发规范知识库"
knowledge_base_description = "Framework standards, implementation rules, and generated project discipline for the shelf repository."
enabled = true
source_types = ["markdown"]
metadata_fields = ["title", "tags", "updated_at"]
default_focus = "current_knowledge_base"
list_variant = "conversation_companion"
allow_create = true
allow_delete = true

# [library.copy] 记录围绕浏览、搜索与管理出现的知识库文案。
# 如果知识库对象本身不变，但用户看到的提示方式需要讨论或优化，优先改这里。
[library.copy]
search_placeholder = "Search knowledge files and snippets"

# [preview] 定义来源预览从用户视角应如何工作。
# 这里回答的是：用户何时能看到来源、来源以什么形态展开、是否显示目录、锚点如何落位。
# 它关心的是“查看来源”这一体验本身，而不是抽屉组件、弹层框架或渲染器代码。
[preview]
enabled = true
renderers = ["markdown"]
anchor_mode = "heading"
show_toc = true
preview_variant = "citation_drawer"

# [chat] 定义核心对话行为与引用语义。
# 这一段决定这个产品的回答形态、引用露出方式、输入体验和欢迎引导，
# 也决定“像 ChatGPT 一样提问”在本产品里具体意味着什么。
# 这里不绑定某个模型供应商、推理链实现、服务编排或 SDK 接线方式，
# 只定义用户与回答系统之间的产品契约。
[chat]
enabled = true
citations_enabled = true
mode = "retrieval_stub"
citation_style = "inline_refs"
bubble_variant = "assistant_soft"
composer_variant = "chatgpt_compact"
system_prompt = "Answer with concise structure-first guidance grounded in the selected knowledge base and cite concrete sections."
welcome_prompts = [
  "总结框架文档到生成代码的编译链",
  "解释引用抽屉和文档详情页如何形成来源回路",
  "说明哪些改动属于框架变更，哪些改动属于实现配置",
  "基于知识库概括 ChatGPT 风格知识问答客户端的结构",
]

# [chat.copy] 收纳聊天区直接向用户展示的文案。
# 包括输入框提示、欢迎说明等，这些文案会直接塑造用户对“如何发问、系统会怎么回应”的预期。
[chat.copy]
placeholder = "询问制度、方案、文档内容，系统会结合知识库回答…"
welcome = "像用 ChatGPT 一样直接提问。回答会嵌入知识库引用，点开后可查看来源片段和文档详情。"

# [context] 定义选择、检索、引用与追问过程中，上下文如何持续传递。
# 它描述用户当前锁定了哪个知识库、一次回答最多带多少引用、来源预览能展开到什么程度、
# 文档焦点是否会在追问之间持续保留。这些都会影响产品行为的一致性。
[context]
selection_mode = "knowledge_base_default"
max_citations = 3
max_preview_sections = 10
sticky_document = false

# [return] 定义来源回路和返回语义。
# 它回答用户点击引用后可以去哪里、从哪里返回、是否恢复到原锚点，
# 决定这个产品是否真正具备“可追溯但不打断主对话”的体验闭环。
# 这里承接的是 citation return truth，不承接登录回跳、受保护目标放行或会话失效处理；
# 这些访问前守卫与恢复语义应继续归属于 [auth]。
[return]
enabled = true
targets = ["citation_drawer", "document_detail"]
anchor_restore = true
citation_card_variant = "chips"

# [[documents]] 记录种子产品内容。
# 这些文档不是测试假数据，而是当前产品真相的一部分：
# 它们决定用户首次进入产品时能检索到什么、引用会落到什么内容、演示链路如何成立。
# 因为它们属于产品层内容，所以适合直接参与产品讨论、评审和对话体验设计。
[[documents]]
document_id = "chat-client-principles"
title = "Chat Client Principles"
summary = "The primary product shape should feel like ChatGPT first and a knowledge platform second."
tags = ["chat", "ux", "frontend"]
updated_at = "2026-03-09"
body_markdown = """
## Chat First
The primary shell should stay close to ChatGPT: a conversation sidebar, one centered message stream, and one bottom composer.

## Citation Second
Citations should appear inline and stay lightweight by default. Source detail only expands when the user asks for it.

## Auxiliary Pages
Knowledge base list, knowledge base detail, and document detail pages exist as secondary pages. They support trust and traceability without replacing the main chat surface.
"""

# 同一产品真相集合中的另一篇种子文档。
# 它专门解释框架、产品规格、实现配置与运行时代码之间的收敛链路，
# 用来帮助用户和实现者在产品内部直接理解“这个系统为什么是这样生成出来的”。
[[documents]]
document_id = "framework-compilation-chain"
title = "Framework Compilation Chain"
summary = "Framework markdown, product spec, implementation config, generated contracts, and runtime code form one deterministic compile path."
tags = ["framework", "generator", "traceability"]
updated_at = "2026-03-09"
body_markdown = """
## Framework To Product Spec
Framework markdown defines structure, boundary, base, rule, and verification statements. Product spec fixes the concrete product truth inside those boundaries.

## Product Spec To Implementation Config
Implementation config refines the product spec into one technical realization path without changing the product truth.

## Generated Runtime
The final application surface, API contract, verification reports, and generated bundle all derive from the same framework plus product spec and implementation config inputs.
"""

# 同一产品真相集合中的另一篇种子文档。
# 它强调知识问答产品的“引用闭环”体验，保证回答、来源抽屉和文档详情页能够组成完整回路。
[[documents]]
document_id = "knowledge-citation-loop"
title = "Knowledge Citation Loop"
summary = "A knowledge answer is complete only when the user can inspect citations, reopen source context, and continue the same conversation."
tags = ["knowledge-base", "citation", "return-path"]
updated_at = "2026-03-09"
body_markdown = """
## Inline References
Assistant answers should attach numbered inline references such as [1] and [2] instead of heavy source cards in the main reading flow.

## Citation Drawer
Clicking a citation opens a right-side drawer with document name, section name, snippet, and source navigation actions.

## Document Detail
From the drawer, the user can open a dedicated document detail page and continue tracing the original section in full context.
"""
