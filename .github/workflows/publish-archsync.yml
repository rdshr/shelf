name: Publish ArchSync

on:
  push:
    tags:
      - "archsync-v*"
  workflow_dispatch:

jobs:
  publish-archsync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: tools/vscode/archsync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve package version
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#archsync-v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}" >&2
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "vsix=tools/vscode/archsync/releases/archsync-${VERSION}.vsix" >> "${GITHUB_OUTPUT}"

      - name: Package VSIX
        run: npx --yes @vscode/vsce package -o "releases/archsync-${{ steps.meta.outputs.version }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: archsync-${{ steps.meta.outputs.version }}-vsix
          path: ${{ steps.meta.outputs.vsix }}

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.vsix }}

      - name: Publish to Open VSX
        if: github.ref_type == 'tag' && secrets.OPEN_VSX_TOKEN != ''
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ steps.meta.outputs.vsix }}
          skipDuplicate: true

      - name: Publish to VS Marketplace
        if: github.ref_type == 'tag' && secrets.VS_MARKETPLACE_TOKEN != ''
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          extensionFile: ${{ steps.meta.outputs.vsix }}
          registryUrl: https://marketplace.visualstudio.com
          skipDuplicate: true
