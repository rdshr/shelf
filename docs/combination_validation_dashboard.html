<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>组合验证结果</title>
  <style>
    :root {
      --line: #ddd6ce;
      --ink: #111827;
      --ok: #166534;
      --fail: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(1000px 400px at 20% -20%, #fef3c7, transparent 60%),
        radial-gradient(1000px 400px at 80% -20%, #dbeafe, transparent 55%),
        #fafaf9;
    }
    .wrap {
      max-width: 1260px;
      margin: 20px auto;
      padding: 0 14px 24px;
      display: grid;
      gap: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.08);
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 14px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fff;
    }
    .ok { color: var(--ok); font-weight: 700; }
    .fail { color: var(--fail); font-weight: 700; }
    .toolbar {
      display: grid;
      grid-template-columns: 180px 180px 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    select, input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      font-size: 14px;
    }
    canvas {
      width: 100%;
      height: 280px;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 10px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }
    .table-wrap {
      max-height: 68vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>

    function updateSummary(items) {

      updateSummary(filtered);

        const stateClass = item.verification.passed ? "ok" : "fail";
        const stateText = item.verification.passed ? "通过" : "失败";

          <td>${item.layers_n}</td>
          <td>${item.footprint_area_units}</td>

      if (!items.length) return;

      const chartW = canvas.width - pad * 2;
      const chartH = canvas.height - pad * 2;
      const maxY = Math.max(...items.map((x) => x.target_efficiency), baseline, 1);
      const barW = chartW / items.length;

      ctx.beginPath();
      ctx.moveTo(pad, canvas.height - pad);
