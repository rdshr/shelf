:back-front)", "equivalent_count": 2, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:none|P:back-front)", "L1(R:BL-BR-FL-FR|P:none) L2(R:none|P:left-right)"], "layers": [{"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, {"rods": [], "support_panels": ["back", "front"], "open_sides": ["right", "left"]}], "obj": "CASE-30.obj", "preview_png": "CASE-30.png"}, {"combo_id": "CASE-31", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL|P:front-right)", "equivalent_count": 4, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL|P:front-right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BR|P:front-left)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FL|P:back-right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FR|P:back-left)"], "layers": [{"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, {"rods": ["BL"], "support_panels": ["front", "right"], "open_sides": ["back", "left"]}], "obj": "CASE-31.obj", "preview_png": "CASE-31.png"}, {"combo_id": "CASE-32", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR|P:front)", "equivalent_count": 4, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR|P:front)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-FL|P:right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BR-FR|P:left)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FL-FR|P:back)"], "layers": [{"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, {"rods": ["BL", "BR"], "support_panels": ["front"], "open_sides": ["right", "back", "left"]}], "obj": "CASE-32.obj", "preview_png": "CASE-32.png"}, {"combo_id": "CASE-33", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR-FL-FR|P:none)", "equivalent_count": 1, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR-FL-FR|P:none)"], "layers": [{"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}], "obj": "CASE-33.obj", "preview_png": "CASE-33.png"}]</script>
<script>
let combos = [];
const statusEl = document.getElementById('status');
function showStatus(msg, isError) {
  if (!statusEl) return;
  statusEl.style.color = isError ? '#b91c1c' : '#065f46';
  statusEl.textContent = msg || '';
}
try {
  const raw = document.getElementById('combo-data').textContent || '[]';
  combos = JSON.parse(raw);
} catch (err) {
  showStatus('Failed to parse combo JSON: ' + String(err), true);
}
window.addEventListener('error', function (e) {
  showStatus('JS error: ' + String(e.message) + ' @' + String(e.lineno) + ':' + String(e.colno), true);
});

const N = 2, X = 30, Y = 30, H = 30;
const TOTAL_H = N * H;
const sideCorners = {
  front: ['FL', 'FR'],
  back: ['BL', 'BR'],
  left: ['FL', 'BL'],
  right: ['FR', 'BR']
};
const cornerXY = {
  FL: [0, 0],
  FR: [X, 0],
  BL: [0, Y],
  BR: [X, Y]
};

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const viewer = document.getElementById('viewer');

let yaw = -0.9;
let pitch = 0.55;
let zoom = 8.2;
let panX = 0;
let panY = 0;
let current = 0;

function fitView() {
  const w = Math.max(1, viewer.clientWidth);
  const h = Math.max(1, viewer.clientHeight);
  const modelSize = Math.max(X, Y, TOTAL_H, 1);
  zoom = Math.max(2.0, Math.min(40.0, Math.min(w, h) * 0.55 / modelSize));
  panX = 0;
  panY = 0;
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  cv.width = Math.max(1, Math.floor(w * dpr));
  cv.height = Math.max(1, Math.floor(h * dpr));
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fitView();
  draw();
}

function rotatePoint(p) {
  const x0 = p[0] - X / 2;
  const y0 = p[1] - Y / 2;
  const z0 = p[2] - TOTAL_H / 2;

  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const x1 = x0 * cy - y0 * sy;
  const y1 = x0 * sy + y0 * cy;
  const z1 = z0;

  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const x2 = x1;
  const y2 = y1 * cp - z1 * sp;
  const z2 = y1 * sp + z1 * cp;
  return [x2, y2, z2];
}

function project(p) {
  const [x, y, z] = rotatePoint(p);
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  const cx = w * 0.5 + panX;
  const cy = h * 0.5 + panY;
  return [cx + x * zoom, cy - y * zoom, z];
}

function buildRods(combo) {
  const rods = { FL: [], FR: [], BL: [], BR: [] };
  for (const c of ['FL', 'FR', 'BL', 'BR']) {
    const segs = [];
    for (let i = 0; i < combo.layers.length; i++) {
      if (combo.layers[i].rods.includes(c)) segs.push([i * H, (i + 1) * H]);
    }
    segs.sort((a, b) => a[0] - b[0]);
    if (!segs.length) continue;
    let a0 = segs[0][0], a1 = segs[0][1];
    for (let i = 1; i < segs.length; i++) {
      const b0 = segs[i][0], b1 = segs[i][1];
      if (Math.abs(a1 - b0) < 1e-9) a1 = b1;
      else { rods[c].push([a0, a1]); a0 = b0; a1 = b1; }
    }
    rods[c].push([a0, a1]);
  }
  return rods;
}

function panelQuad(side, z0, z1) {
  const c = sideCorners[side];
  const p0 = cornerXY[c[0]];
  const p1 = cornerXY[c[1]];
  return [
    [p0[0], p0[1], z0],
    [p1[0], p1[1], z0],
    [p1[0], p1[1], z1],
    [p0[0], p0[1], z1],
  ];
}

function drawFace(points3, fill, stroke) {
  const pts = points3.map(project);
  const zAvg = pts.reduce((s, p) => s + p[2], 0) / pts.length;
  return { pts, zAvg, fill, stroke };
}

function draw() {
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  ctx.clearRect(0, 0, w, h);

  const combo = combos[current];
  if (!combo) return;

  const faces = [];

  for (let level = 1; level <= N; level++) {
    const z = level * H;
    faces.push(drawFace(
      [[0,0,z], [X,0,z], [X,Y,z], [0,Y,z]],
      'rgba(59,130,246,0.30)', 'rgba(30,64,175,0.90)'
    ));
  }

  for (let i = 0; i < combo.layers.length; i++) {
    const layer = combo.layers[i];
    const z0 = i * H;
    const z1 = (i + 1) * H;
    const alpha = 0.45;
    const red = 245 - (i % 4) * 8;
    const green = 158 - (i % 4) * 14;
    const blue = 11 + (i % 4) * 12;
    for (const s of layer.support_panels) {
      faces.push(drawFace(panelQuad(s, z0, z1), `rgba(${red},${green},${blue},${alpha})`, 'rgba(154,52,18,0.95)'));
    }
  }

  faces.sort((a, b) => a.zAvg - b.zAvg);
  for (const f of faces) {
    ctx.beginPath();
    ctx.moveTo(f.pts[0][0], f.pts[0][1]);
    for (let i = 1; i < f.pts.length; i++) ctx.lineTo(f.pts[i][0], f.pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = f.fill;
    ctx.fill();
    ctx.strokeStyle = f.stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  const rods = buildRods(combo);
  ctx.strokeStyle = 'rgba(17,24,39,1)';
  ctx.lineWidth = 3;
  for (const c of ['FL', 'FR', 'BL', 'BR']) {
    const xy = cornerXY[c];
    for (const seg of rods[c]) {
      const p0 = project([xy[0], xy[1], seg[0]]);
      const p1 = project([xy[0], xy[1], seg[1]]);
      ctx.beginPath();
      ctx.moveTo(p0[0], p0[1]);
      ctx.lineTo(p1[0], p1[1]);
      ctx.stroke();
    }
  }
}

function refreshInfo() {
  const combo = combos[current];
  if (!combo) {
    document.getElementById('info').textContent = '';
    return;
  }
  const lines = [
    combo.combo_id,
    combo.label,
    'equivalent_count=' + combo.equivalent_count
  ];
  for (let i = 0; i < combo.layers.length; i++) {
    const layer = combo.layers[i];
    lines.push(`L${i + 1} rods=` + JSON.stringify(layer.rods));
    lines.push(`L${i + 1} panels=` + JSON.stringify(layer.support_panels));
  }
  document.getElementById('info').textContent = lines.join('\n');
}

function renderCurrent() {
  if (!combos.length) {
    showStatus('No combos available to render.', true);
    draw();
    return;
  }
  const sel = document.getElementById('comboSelect');
  sel.value = String(current);
  refreshInfo();
  draw();
}

try {
  const sel = document.getElementById('comboSelect');
  combos.forEach((c, idx) => {
    const op = document.createElement('option');
    op.value = String(idx);
    op.textContent = c.combo_id + '  (' + c.equivalent_count + ')  ' + c.label;
    sel.appendChild(op);
  });
  sel.addEventListener('change', () => {
    current = Number(sel.value);
    renderCurrent();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    current = (current - 1 + combos.length) % combos.length;
    renderCurrent();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    current = (current + 1) % combos.length;
    renderCurrent();
  });
  document.getElementById('fitBtn').addEventListener('click', () => {
    fitView();
    draw();
  });

  let dragging = false;
  let mode = 'rotate';
  let lastX = 0;
  let lastY = 0;
  cv.addEventListener('contextmenu', (e) => e.preventDefault());
  cv.addEventListener('mousedown', (e) => {
    dragging = true;
    mode = (e.button === 2) ? 'pan' : 'rotate';
    lastX = e.clientX;
    lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => dragging = false);
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    if (mode === 'rotate') {
      yaw += dx * 0.008;
      pitch += dy * 0.008;
      pitch = Math.max(-1.4, Math.min(1.4, pitch));
    } else {
      panX += dx;
      panY += dy;
    }
    draw();
  });
  cv.addEventListener('wheel', (e) => {
    e.preventDefault();
    const k = Math.exp(-e.deltaY * 0.0015);
    zoom = Math.max(2.0, Math.min(40.0, zoom * k));
    draw();
  }, { passive: false });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  renderCurrent();
  showStatus('Viewer ready. combos=' + combos.length, false);
} catch (err) {
  showStatus('Viewer init failed: ' + String(err), true);
}
</script>
</body>
