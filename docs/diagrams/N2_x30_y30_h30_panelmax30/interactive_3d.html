R"], "support_panels": ["back", "left"], "open_sides": ["front", "right"]}, "obj": "CASE-29.obj", "preview_png": "CASE-29.png"}, {"combo_id": "CASE-30", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:none|P:back-front)", "equivalent_count": 2, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:none|P:back-front)", "L1(R:BL-BR-FL-FR|P:none) L2(R:none|P:left-right)"], "layer1": {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, "layer2": {"rods": [], "support_panels": ["back", "front"], "open_sides": ["right", "left"]}, "obj": "CASE-30.obj", "preview_png": "CASE-30.png"}, {"combo_id": "CASE-31", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL|P:front-right)", "equivalent_count": 4, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL|P:front-right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BR|P:front-left)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FL|P:back-right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FR|P:back-left)"], "layer1": {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, "layer2": {"rods": ["BL"], "support_panels": ["front", "right"], "open_sides": ["back", "left"]}, "obj": "CASE-31.obj", "preview_png": "CASE-31.png"}, {"combo_id": "CASE-32", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR|P:front)", "equivalent_count": 4, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR|P:front)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-FL|P:right)", "L1(R:BL-BR-FL-FR|P:none) L2(R:BR-FR|P:left)", "L1(R:BL-BR-FL-FR|P:none) L2(R:FL-FR|P:back)"], "layer1": {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, "layer2": {"rods": ["BL", "BR"], "support_panels": ["front"], "open_sides": ["right", "back", "left"]}, "obj": "CASE-32.obj", "preview_png": "CASE-32.png"}, {"combo_id": "CASE-33", "label": "L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR-FL-FR|P:none)", "equivalent_count": 1, "equivalent_members": ["L1(R:BL-BR-FL-FR|P:none) L2(R:BL-BR-FL-FR|P:none)"], "layer1": {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, "layer2": {"rods": ["BL", "BR", "FL", "FR"], "support_panels": [], "open_sides": ["front", "right", "back", "left"]}, "obj": "CASE-33.obj", "preview_png": "CASE-33.png"}];
const X = 30, Y = 30, H = 30;
const sideCorners = {
  front: ['FL', 'FR'],
  back: ['BL', 'BR'],
  left: ['FL', 'BL'],
  right: ['FR', 'BR']
};
const cornerXY = {
  FL: [0, 0],
  FR: [X, 0],
  BL: [0, Y],
  BR: [X, Y]
};

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const viewer = document.getElementById('viewer');

let yaw = -0.9;
let pitch = 0.55;
let zoom = 8.2;
let panX = 0;
let panY = 0;
let current = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  cv.width = Math.max(1, Math.floor(w * dpr));
  cv.height = Math.max(1, Math.floor(h * dpr));
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function rotatePoint(p) {
  // shift origin to shelf center on xy
  const x0 = p[0] - X / 2;
  const y0 = p[1] - Y / 2;
  const z0 = p[2] - H;

  // yaw around z
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const x1 = x0 * cy - y0 * sy;
  const y1 = x0 * sy + y0 * cy;
  const z1 = z0;

  // pitch around x
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const x2 = x1;
  const y2 = y1 * cp - z1 * sp;
  const z2 = y1 * sp + z1 * cp;
  return [x2, y2, z2];
}

function project(p) {
  const [x, y, z] = rotatePoint(p);
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  const cx = w * 0.5 + panX;
  const cy = h * 0.5 + panY;
  return [cx + x * zoom, cy - y * zoom, z];
}

function buildRods(combo) {
  const rods = { FL: [], FR: [], BL: [], BR: [] };
  for (const c of ['FL', 'FR', 'BL', 'BR']) {
    const segs = [];
    if (combo.layer1.rods.includes(c)) segs.push([0, H]);
    if (combo.layer2.rods.includes(c)) segs.push([H, 2 * H]);
    segs.sort((a, b) => a[0] - b[0]);
    if (!segs.length) continue;
    let a0 = segs[0][0], a1 = segs[0][1];
    for (let i = 1; i < segs.length; i++) {
      const b0 = segs[i][0], b1 = segs[i][1];
      if (Math.abs(a1 - b0) < 1e-9) a1 = b1;
      else { rods[c].push([a0, a1]); a0 = b0; a1 = b1; }
    }
    rods[c].push([a0, a1]);
  }
  return rods;
}

function panelQuad(side, z0, z1) {
  const c = sideCorners[side];
  const p0 = cornerXY[c[0]];
  const p1 = cornerXY[c[1]];
  return [
    [p0[0], p0[1], z0],
    [p1[0], p1[1], z0],
    [p1[0], p1[1], z1],
    [p0[0], p0[1], z1],
  ];
}

function drawFace(points3, fill, stroke) {
  const pts = points3.map(project);
  const zAvg = pts.reduce((s, p) => s + p[2], 0) / pts.length;
  return { pts, zAvg, fill, stroke };
}

function draw() {
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  ctx.clearRect(0, 0, w, h);

  const combo = combos[current];
  if (!combo) return;

  const faces = [];

  // load boards
  faces.push(drawFace(
    [[0,0,H], [X,0,H], [X,Y,H], [0,Y,H]],
    'rgba(59,130,246,0.30)', 'rgba(30,64,175,0.90)'
  ));
  faces.push(drawFace(
    [[0,0,2*H], [X,0,2*H], [X,Y,2*H], [0,Y,2*H]],
    'rgba(59,130,246,0.30)', 'rgba(30,64,175,0.90)'
  ));

  // side support panels
  for (const s of combo.layer1.support_panels) {
    faces.push(drawFace(panelQuad(s, 0, H), 'rgba(245,158,11,0.45)', 'rgba(154,52,18,0.95)'));
  }
  for (const s of combo.layer2.support_panels) {
    faces.push(drawFace(panelQuad(s, H, 2*H), 'rgba(249,115,22,0.45)', 'rgba(154,52,18,0.95)'));
  }

  // painter's order: far to near
  faces.sort((a, b) => a.zAvg - b.zAvg);
  for (const f of faces) {
    ctx.beginPath();
    ctx.moveTo(f.pts[0][0], f.pts[0][1]);
    for (let i = 1; i < f.pts.length; i++) ctx.lineTo(f.pts[i][0], f.pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = f.fill;
    ctx.fill();
    ctx.strokeStyle = f.stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // rods
  const rods = buildRods(combo);
  ctx.strokeStyle = 'rgba(17,24,39,1)';
  ctx.lineWidth = 3;
  for (const c of ['FL', 'FR', 'BL', 'BR']) {
    const xy = cornerXY[c];
    for (const seg of rods[c]) {
      const p0 = project([xy[0], xy[1], seg[0]]);
      const p1 = project([xy[0], xy[1], seg[1]]);
      ctx.beginPath();
      ctx.moveTo(p0[0], p0[1]);
      ctx.lineTo(p1[0], p1[1]);
      ctx.stroke();
    }
  }
}

function refreshInfo() {
  const combo = combos[current];
  document.getElementById('info').textContent =
    combo.combo_id + '\n' +
    combo.label + '\n' +
    'equivalent_count=' + combo.equivalent_count + '\n' +
    'L1 rods=' + JSON.stringify(combo.layer1.rods) + '\n' +
    'L1 panels=' + JSON.stringify(combo.layer1.support_panels) + '\n' +
    'L2 rods=' + JSON.stringify(combo.layer2.rods) + '\n' +
    'L2 panels=' + JSON.stringify(combo.layer2.support_panels);
}

function renderCurrent() {
  const sel = document.getElementById('comboSelect');
  sel.value = String(current);
  refreshInfo();
  draw();
}

const sel = document.getElementById('comboSelect');
combos.forEach((c, idx) => {
  const op = document.createElement('option');
  op.value = String(idx);
  op.textContent = c.combo_id + '  (' + c.equivalent_count + ')  ' + c.label;
  sel.appendChild(op);
});
sel.addEventListener('change', () => {
  current = Number(sel.value);
  renderCurrent();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  current = (current - 1 + combos.length) % combos.length;
  renderCurrent();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  current = (current + 1) % combos.length;
  renderCurrent();
});

let dragging = false;
let mode = 'rotate';
let lastX = 0;
let lastY = 0;
cv.addEventListener('contextmenu', (e) => e.preventDefault());
cv.addEventListener('mousedown', (e) => {
  dragging = true;
  mode = (e.button === 2) ? 'pan' : 'rotate';
  lastX = e.clientX;
  lastY = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  if (mode === 'rotate') {
    yaw += dx * 0.008;
    pitch += dy * 0.008;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
  } else {
    panX += dx;
    panY += dy;
  }
  draw();
});
cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  const k = Math.exp(-e.deltaY * 0.0015);
  zoom = Math.max(2.0, Math.min(40.0, zoom * k));
  draw();
}, { passive: false });

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
renderCurrent();
</script>
